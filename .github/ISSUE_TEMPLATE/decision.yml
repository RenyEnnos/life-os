name: Human decision
description: Compare options and prepare a choice that agents may not approve alone
title: "[DECISION] "
body:
  - type: markdown
    attributes:
      value: |
        Opening this issue does not approve a decision. A human maintainer must record the final choice in the issue or an accepted ADR before implementation begins.
  - type: textarea
    id: decision
    attributes:
      label: Decision required
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and constraints
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Observed evidence
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options to compare
    validations:
      required: true
  - type: textarea
    id: drivers
    attributes:
      label: Decision drivers
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Consequences, migration, and rollback
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: Recommendation, uncertainty, and dissent
      description: Agents may recommend an option but must identify uncertainty and alternatives.
    validations:
      required: true

name: Bug report
description: Report reproducible behavior that contradicts an approved contract
title: "[BUG] "
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior and source
      description: Link the contract, decision, documentation, or prior behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and runtime
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, paths, or failing tests
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact, data risk, and workaround
    validations:
      required: true

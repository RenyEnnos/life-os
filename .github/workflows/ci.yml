name: Quality Gate
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Enforce lockfile policy
        run: |
          test -f package-lock.json || (echo "Missing package-lock.json"; exit 1)
          test ! -f pnpm-lock.yaml || (echo "pnpm-lock.yaml is not allowed in CI"; exit 1)
          test ! -f yarn.lock || (echo "yarn.lock is not allowed in CI"; exit 1)
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm run electron:build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Minimal smoke gate
        run: xvfb-run -a npm run test:e2e -- --grep "desktop smoke: Life OS main window"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/
          retention-days: 1

name: Web CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  static-and-unit:
    name: web / static-and-unit
    runs-on: ubuntu-latest
    env:
      LIFEOS_OPERATING_MODE: local-dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Enforce lockfile policy
        run: |
          test -f package-lock.json || (echo "Missing package-lock.json"; exit 1)
          test ! -f pnpm-lock.yaml || (echo "pnpm-lock.yaml is not allowed in CI"; exit 1)
          test ! -f yarn.lock || (echo "yarn.lock is not allowed in CI"; exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit, integration, and API contract tests
        run: npm run test
        env:
          LIFEOS_SESSION_SECRET: test-secret-for-ci

      - name: Build web client
        run: npm run build

      - name: Build server
        run: npm run build:server

  canonical-e2e:
    name: web / canonical-e2e
    runs-on: ubuntu-latest
    env:
      LIFEOS_OPERATING_MODE: local-dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run canonical browser journey
        run: npm run test:e2e

      - name: Remove synthetic fixtures
        if: always()
        run: rm -rf test-results/canonical

name: Docker Acceptance Smoke

on:
  workflow_dispatch:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend and server
        run: npm run build && npm run build:server

      - name: Build Docker image
        run: docker build -t lifeos-runtime-smoke .

      - name: Run container
        run: |
          docker run -d --name lifeos-runtime-smoke -p 3001:3001 \
            -e LIFEOS_SESSION_SECRET=synthetic-docker-smoke-secret \
            -e LIFEOS_MVP_REPOSITORY=file \
            lifeos-runtime-smoke

      - name: Wait for inherited healthcheck
        run: |
          for i in {1..20}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' lifeos-runtime-smoke)"
            if [ "$status" = healthy ]; then
              exit 0
            fi
            if [ "$status" = unhealthy ]; then
              echo "Container healthcheck failed"
              exit 1
            fi
            sleep 3
          done
          echo "Container did not become healthy in time"
          exit 1

      - name: Verify image contract
        run: |
          curl --fail --silent --show-error http://127.0.0.1:3001/api/health
          curl --fail --silent --show-error http://127.0.0.1:3001/
          curl --fail --silent --show-error http://127.0.0.1:3001/mvp/today
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3001/api/auth/verify)" = 401

      - name: Container logs
        if: always()
        run: docker logs lifeos-runtime-smoke || true

      - name: Cleanup container
        if: always()
        run: docker rm -f lifeos-runtime-smoke || true

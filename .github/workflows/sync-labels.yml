name: Sync governance labels

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: sync-labels
    runs-on: ubuntu-latest
    steps:
      - name: Read catalog and create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const defaultBranch = context.payload.repository?.default_branch;
            if (!defaultBranch) {
              core.setFailed('Could not determine the repository default branch.');
              return;
            }

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/labels.json',
              ref: defaultBranch,
            });

            if (Array.isArray(file) || file.type !== 'file' || !file.content) {
              core.setFailed('Expected .github/labels.json to be a file on the default branch.');
              return;
            }

            let labels;
            try {
              labels = JSON.parse(
                Buffer.from(file.content, file.encoding || 'base64').toString('utf8')
              );
            } catch (error) {
              core.setFailed(`Could not parse .github/labels.json: ${error.message}`);
              return;
            }

            if (!Array.isArray(labels)) {
              core.setFailed('labels.json must contain an array of label objects.');
              return;
            }

            const names = new Set();
            for (const label of labels) {
              if (
                !label ||
                typeof label !== 'object' ||
                typeof label.name !== 'string' ||
                !label.name.trim() ||
                typeof label.color !== 'string' ||
                !/^[0-9A-Fa-f]{6}$/.test(label.color) ||
                typeof label.description !== 'string'
              ) {
                core.setFailed(`Invalid label entry: ${JSON.stringify(label)}`);
                return;
              }
              if (names.has(label.name)) {
                core.setFailed(`Duplicate label name: ${label.name}`);
                return;
              }
              names.add(label.name);
            }

            const existing = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );
            const byName = new Map(existing.map((label) => [label.name, label]));

            for (const label of labels) {
              const current = byName.get(label.name);
              if (current) {
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: current.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`Updated ${label.name}`);
              } else {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`Created ${label.name}`);
              }
            }

            core.info(`Synchronized ${labels.length} managed labels from ${defaultBranch}.`);

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: life-os-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LIFEOS_SESSION_SECRET=${LIFEOS_SESSION_SECRET:?LIFEOS_SESSION_SECRET is required}
      - LIFEOS_MVP_REPOSITORY=file
    volumes:
      - life-os-data:/app/.data

volumes:
  life-os-data:
